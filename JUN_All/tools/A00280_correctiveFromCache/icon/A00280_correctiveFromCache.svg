<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#2d2d30" stroke="#4a4a4f" stroke-width="1.5"/>

  <!-- Alembic cache (wrinkled cloth) : wavy lines feeding in from the left -->
  <g stroke="#54a0ff" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M4 10 q2.2 -2 4.4 0 t4.4 0"/>
    <path d="M4 15 q2.2 -2 4.4 0 t4.4 0"/>
    <path d="M4 20 q2.2 -2 4.4 0 t4.4 0"/>
  </g>

  <!-- RBF pose driver hub : node with radial spokes (corrective output) -->
  <g stroke="#ff8a5c" stroke-width="1.4">
    <line x1="23" y1="16" x2="27" y2="9"/>
    <line x1="23" y1="16" x2="28" y2="16"/>
    <line x1="23" y1="16" x2="27" y2="23"/>
  </g>
  <g fill="#ff8a5c" stroke="#c85a30" stroke-width="0.8">
    <circle cx="27" cy="9" r="2"/>
    <circle cx="28" cy="16" r="2"/>
    <circle cx="27" cy="23" r="2"/>
  </g>
  <circle cx="22" cy="16" r="3.2" fill="#feca57" stroke="#c89b20" stroke-width="0.8"/>

  <!-- arrow cache -> solver -->
  <g stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="14" y1="15.5" x2="18" y2="15.5"/>
