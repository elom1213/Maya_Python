<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#2d2d30" stroke="#4a4a4f" stroke-width="1.5"/>
  <!-- object being selected -->
  <rect x="8" y="8" width="5" height="5" rx="1" fill="#4a9eff"/>
  <!-- selection marquee -->
  <rect x="5.5" y="5.5" width="15" height="15" rx="1.5" fill="none"
        stroke="#6cb6ff" stroke-width="1.6" stroke-dasharray="3 2.4"/>
  <!-- arrow cursor -->
  <polygon points="14.5,13.5 14.5,25.5 17.5,22.5 20,27.5 21.5,26.8 19.2,22 23,22"
           fill="#e8edf2" stroke="#1e2024" stroke-width="1.1" stroke-linejoin="round"/>
</svg>
