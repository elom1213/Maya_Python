<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- A00360_SortTool shelf icon: decreasing sort bars + direction arrow -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#2d2d30" stroke="#4a4a4f" stroke-width="1.5"/>
  <!-- sort bars (decreasing length) -->
  <g fill="#ff9e64">
    <rect x="5" y="8.4" width="15" height="2.8" rx="1.4"/>
    <rect x="5" y="14.6" width="10.5" height="2.8" rx="1.4"/>
    <rect x="5" y="20.8" width="6" height="2.8" rx="1.4"/>
  </g>
  <!-- direction arrow (top -> bottom) -->
  <g stroke="#e8edf2" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M25 7 L25 23.2"/>
    <path d="M21.4 19.2 L25 23.6 L28.6 19.2"/>
  </g>
</svg>
